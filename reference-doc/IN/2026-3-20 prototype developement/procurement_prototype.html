<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis PMO - Procurement</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 表格冻结列阴影效果 */
        .sticky-col-shadow {
            box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.05);

</head>
<body class="bg-[#FDFDFE] text-gray-900 font-sans antialiased overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 简化的图标组件 (使用 Lucide) ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const iconRef = React.useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className }
                    });
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name}></i>;
        };

        // --- UI 基础组件 ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl border border-gray-100 shadow-sm ${className}`}>
                {children}
            </div>
        );

        const Badge = ({ children, variant = "default" }) => {
            const styles = {
                default: "bg-gray-100 text-gray-700",
                success: "bg-emerald-50 text-emerald-700 border border-emerald-100",
                warning: "bg-amber-50 text-amber-700 border border-amber-100",
                danger: "bg-rose-50 text-rose-700 border border-rose-100",
                info: "bg-blue-50 text-blue-700 border border-blue-100",
                dark: "bg-slate-800 text-emerald-400 border border-slate-700"
            };
            return (
                <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${styles[variant]}`}>
                    {children}
                </span>
            );
        };

        const ProgressBar = ({ value, colorClass = "bg-blue-500" }) => (
            <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                <div className={`h-full ${colorClass}`} style={{ width: `${value}%` }} />
            </div>
        );

        // --- 核心采购模块视图 (优化版) ---
        const ProcurementPageView = () => {
            // 模拟数据
            const kpis = [
                { title: "Tender Packages Under Review", value: "6", subtitle: "2 packages exceed commercial spread threshold", icon: "shopping-cart", color: "blue" },
                { title: "Compliant Bidders", value: "14 / 18", subtitle: "78% pass digital BQ validation", icon: "shield-check", color: "emerald" },
                { title: "Flagged Contractual Risks", value: "9", subtitle: "3 unbalanced bid patterns detected", icon: "triangle-alert", color: "rose" },
                { title: "Pending Clarifications", value: "21", subtitle: "7 responses due inside the next 48 hours", icon: "clock", color: "amber" }

                { id: 1, name: "Aurex Build Systems", riskLevel: "LOW", price: "$48.6M", spread: "-1.2% vs estimate", score: 96, bqDev: "0.9%", contractRisk: 28, anomaly: false, desc: "Clause schedule aligns with the tender baseline and only minor mock-up sequencing confirmation remains." },

            ];

            return (
                <div className="space-y-6 animate-in fade-in duration-500 max-w-7xl mx-auto">

                                            <th className="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Offer / Spread</th>
                                            <th className="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Compliance</th>
                                            <th className="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">BQ Deviation</th>
                                            <th className="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Contract Risk</th>
                                            <th className="px-6 py-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Profile</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {bidders.map((b, i) => (
                                            /* 优化视觉热点：如果存在严重异常，整行高亮为浅红色，引导视线水平移动 */

                                                <td className={`px-6 py-4 sticky left-0 z-10 w-1/3 sticky-col-shadow transition-colors ${b.anomaly ? 'bg-[#fff5f5]' : 'bg-white'}`}>

                                                <td className="px-6 py-4 align-top pt-5">
                                                    <p className="text-sm font-bold text-gray-900">{b.price}</p>
                                                    <p className="text-[10px] text-gray-500 mt-1">{b.spread}</p>

                                                <td className="px-6 py-4 align-top pt-5 w-32">

                                                    </div>
                                                    <ProgressBar value={b.score} colorClass={b.score > 90 ? "bg-blue-500" : b.score > 85 ? "bg-amber-400" : "bg-rose-500"} />
                                                </td>
                                                <td className="px-6 py-4 align-top pt-5">
                                                    {/* 优化 3: 进一步强化异常数据 */}
                                                    {b.anomaly ? (
                                                        <div className="inline-flex items-center px-2 py-1 bg-rose-100 border border-rose-300 rounded text-rose-800 font-bold text-xs shadow-sm ring-2 ring-rose-500/20">

                                                <td className="px-6 py-4 align-top pt-5 w-32">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="text-[10px] font-bold text-gray-500">RISK</span>
                                                        <span className={`text-[11px] font-bold ${b.contractRisk > 60 ? 'text-rose-600' : b.contractRisk > 40 ? 'text-amber-500' : 'text-emerald-500'}`}>{b.contractRisk}</span>
                                                    </div>
                                                    <ProgressBar value={b.contractRisk} colorClass={b.contractRisk > 60 ? "bg-rose-500" : b.contractRisk > 40 ? "bg-amber-400" : "bg-emerald-500"} />
                                                </td>
                                                <td className="px-6 py-4 align-top pt-5">

                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </Card>

                        {/* Right: Insights & AI Risk */}
                        <div className="space-y-6 flex flex-col">
                            {/* Service Provider Profiling */}
                            <Card className="p-6">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="flex items-center space-x-2">
                                        <Icon name="shield-check" className="w-5 h-5 text-emerald-500" />

                                <div className="p-4 bg-gray-50 rounded-xl mb-6 group cursor-pointer hover:bg-white border border-transparent hover:border-gray-200 transition-all shadow-sm">
                                    <div className="flex justify-between items-center mb-2">
                                        <h4 className="font-bold text-sm text-gray-900">Aurex Build Systems</h4>
                                        <Icon name="external-link" className="w-3.5 h-3.5 text-gray-400 group-hover:text-blue-500" />

                                        <p className="text-[9px] font-black text-gray-400 uppercase tracking-widest mb-1">Historic Claim Ratio</p>
