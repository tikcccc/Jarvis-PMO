<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Smart Site Safety System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #f8fafc; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .heatmap-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 共享組件 (Shared Components) ---

        // ECharts 封裝組件
        const ReactEChart = ({ option, style, className }) => {
            const chartRef = useRef(null);

            useEffect(() => {
                let chartInstance = window.echarts.getInstanceByDom(chartRef.current);
                if (!chartInstance) {
                    chartInstance = window.echarts.init(chartRef.current);
                }
                chartInstance.setOption(option);

                const handleResize = () => chartInstance.resize();
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    chartInstance.dispose();
                };
            }, [option]);

            return <div ref={chartRef} style={style} className={className}></div>;
        };

        // CCTV 視頻佔位組件 (CCTV Placeholder)
        const CCTVPlaceholder = ({ title, time, imgUrl, status = "Online" }) => (
            <div className="relative w-full h-full bg-gray-900 rounded-lg overflow-hidden group border border-gray-200 shadow-sm">
                <div className="absolute top-0 left-0 w-full p-3 bg-gradient-to-b from-black/70 to-transparent z-10 flex justify-between items-start">
                    <span className="text-white text-xs font-semibold drop-shadow-md">{title}</span>
                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded ${status === 'Online' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-rose-500/20 text-rose-400 border border-rose-500/50'}`}>
                        {status === 'Online' ? 'REC' : 'OFFLINE'}
                    </span>
                </div>
                <img 
                    src={imgUrl || "https://images.unsplash.com/photo-1541888081604-92e104e137b0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"} 
                    className="w-full h-full object-cover opacity-70 group-hover:opacity-90 transition-opacity" 
                    alt="CCTV Feed" 
                />
                <div className="absolute bottom-2 left-3 text-white/80 font-mono text-[10px] z-10 drop-shadow-md">
                    {time || "2026-03-24 10:45:30"}
                </div>
                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-20">
                    <button className="bg-white/20 hover:bg-white/40 text-white rounded-full p-3 backdrop-blur-sm border border-white/50 transition-all">
                        <Icons.Play />
                    </button>
                </div>
            </div>
        );

        // GIS 地圖佔位組件 (GIS Placeholder using OpenStreetMap)
        const GISPlaceholder = ({ children }) => (
            <div className="relative w-full h-full bg-gray-200 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                <iframe 
                    width="100%" height="100%" frameBorder="0" scrolling="no" 
                    src="https://www.openstreetmap.org/export/embed.html?bbox=113.8%2C22.2%2C114.4%2C22.6&layer=mapnik" 
                    style={{border: 0, filter: 'grayscale(0.5) contrast(1.1) brightness(0.95)'}}>
                </iframe>
                {/* 地圖上的控制按鈕 */}
                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 flex bg-white/90 backdrop-blur rounded shadow-md text-[10px] font-bold z-10 border border-gray-100 p-1">
                    <button className="px-3 py-1.5 text-gray-700 hover:bg-gray-100 rounded">Map View</button>
                    <button className="px-3 py-1.5 bg-blue-50 text-blue-600 rounded">Satellite</button>
                </div>
                {/* 傳入的標記或圖層 (Markers/Layers) */}
                {children}
            </div>
        );

        // 圖標庫 (Icons)
        const Icons = {
            Home: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
            Tracking: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
            Grid: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="9" x2="9" y1="21" y2="9"/></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
            Vehicle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><path d="M4 8h16"/><path d="M8 4v4"/><path d="M16 4v4"/><path d="M8 16h8"/></svg>,
            Wind: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 1 2 4H2"/><path d="M9.8 4.4A2 2 0 1 1 11 8H2"/></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            AlertTriangle: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
        };

        // --- 核心模塊視圖 (Main Module Views) ---

        // 0. Central Management Platform (CMP) - 重構為截圖中的佈局
        const CentralManagement = () => {
            const eLockPieOption = {
                tooltip: { trigger: 'item' },
                color: ['#2563eb', '#60a5fa'],
                series: [{
                    type: 'pie', radius: ['60%', '80%'], label: { show: false },
                    data: [ { value: 5, name: 'Online' }, { value: 4, name: 'Offline' } ]
                }]
            };

            const alerts = [
                { title: 'AI Camera', count: 0, icon: <Icons.Play />, color: 'text-blue-500', bg: 'bg-blue-50' },
                { title: 'Equip Alert', count: 0, icon: <Icons.Grid />, color: 'text-indigo-500', bg: 'bg-indigo-50' },
                { title: 'Vehicle Alert', count: 9, icon: <Icons.Vehicle />, color: 'text-orange-500', bg: 'bg-orange-50' },
                { title: 'Gas Alert', count: 0, icon: <Icons.Wind />, color: 'text-rose-500', bg: 'bg-rose-50' },
                { title: 'E-Lock Alert', count: 0, icon: <Icons.Shield />, color: 'text-red-500', bg: 'bg-red-50' },
                { title: 'Watch Alert', count: 1, icon: <Icons.User />, color: 'text-purple-500', bg: 'bg-purple-50' },
            ];

            return (
                <div className="flex flex-col h-full gap-4 animate-in fade-in duration-500">
                    <div className="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                        <div className="flex items-center gap-4">
                            <h2 className="text-xl font-bold text-gray-800">Central Management Platform</h2>
                            <span className="text-blue-600 font-bold border-b-2 border-blue-600 pb-1 text-sm">Home</span>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex gap-4 overflow-hidden">
                        {/* 左側欄 (Left Column) */}
                        <div className="w-72 flex flex-col gap-4">
                            <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                                <h3 className="text-sm font-bold text-gray-700 mb-4">E-Lock Info</h3>
                                <div className="flex items-center">
                                    <div className="w-24 h-24 relative">
                                        <ReactEChart option={eLockPieOption} className="w-full h-full" />
                                        <div className="absolute inset-0 flex items-center justify-center font-black text-2xl text-gray-800">9</div>
                                    </div>
                                    <div className="ml-4 text-xs font-bold space-y-2">
                                        <div className="flex items-center gap-2"><span className="w-2.5 h-2.5 bg-blue-600 rounded-full"></span> Online: 5</div>
                                        <div className="flex items-center gap-2"><span className="w-2.5 h-2.5 bg-blue-400 rounded-full"></span> Offline: 4</div>
                                    </div>
                                </div>
                                <div className="mt-6 bg-orange-50 text-orange-600 p-3 rounded-lg text-sm font-bold flex items-center gap-3 border border-orange-100">
                                    <div className="p-1.5 bg-orange-100 rounded-md"><Icons.Bell /></div>
                                    Alert Count: <span className="text-xl">0</span>
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex-1 flex flex-col">
                                <h3 className="text-sm font-bold text-gray-700 mb-3">Safety Video Status</h3>
                                <div className="space-y-2 flex-1 overflow-y-auto">
                                    {['02', '01'].map(id => (
                                        <div key={id} className="flex justify-between items-center p-2.5 border border-gray-100 rounded-lg text-xs">
                                            <span className="font-semibold text-gray-700">CV202318 - AICCTV {id}</span>
                                            <span className="text-emerald-500 font-bold bg-emerald-50 px-2 py-1 rounded">Online</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 pt-3 border-t border-gray-50">
                                    <h3 className="text-sm font-bold text-gray-700 mb-1">AI Monitoring</h3>
                                    <div className="text-2xl font-black text-gray-800">50</div>
                                </div>
                            </div>
                        </div>

                        {/* 中間欄 GIS 地圖 (Center Column) */}
                        <div className="flex-1 relative bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                            <GISPlaceholder>
                                <div className="absolute top-4 left-1/2 transform -translate-x-1/2 flex bg-white rounded shadow-md text-xs font-bold z-10 border border-gray-200">
                                    <button className="px-4 py-2.5 text-gray-700 hover:bg-gray-50 border-r border-gray-200">Project Location</button>
                                    <button className="px-4 py-2.5 text-blue-600 hover:bg-blue-50">All Devices</button>
                                </div>
                                {/* 模擬截圖中的地圖圖標 */}
                                <div className="absolute top-[30%] left-[30%] flex flex-col items-center z-20">
                                    <div className="w-10 h-10 bg-gray-500 text-white rounded-full border-4 border-white shadow-lg flex items-center justify-center"><Icons.Shield /></div>
                                    <span className="bg-white px-2 py-1 mt-1 text-[10px] font-bold rounded shadow border border-gray-200">CV202318 - Lock 10</span>
                                </div>
                                <div className="absolute bottom-[35%] right-[30%] flex flex-col items-center z-20">
                                    <div className="flex gap-2">
                                        <div className="w-8 h-8 bg-gray-500 text-white rounded-full border-2 border-white shadow-lg flex items-center justify-center"><Icons.Vehicle /></div>
                                        <div className="w-8 h-8 bg-gray-500 text-white rounded-full border-2 border-white shadow-lg flex items-center justify-center"><Icons.User /></div>
                                    </div>
                                    <span className="bg-white px-2 py-1 mt-1 text-[10px] font-bold rounded shadow border border-gray-200">CV202318</span>
                                </div>
                            </GISPlaceholder>
                        </div>

                        {/* 右側欄 (Right Column) */}
                        <div className="w-80 flex flex-col gap-4">
                            <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-sm font-bold text-gray-700">Today's Alerts</h3>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    {alerts.map((alert, i) => (
                                        <div key={i} className="border border-gray-100 rounded-xl p-3 flex flex-col items-center justify-center bg-gray-50/50 hover:bg-white transition-colors">
                                            <div className={`w-10 h-10 ${alert.bg} ${alert.color} rounded-full flex items-center justify-center mb-2 shadow-sm`}>
                                                {alert.icon}
                                            </div>
                                            <span className="text-[10px] font-bold text-gray-500 uppercase">{alert.title}</span>
                                            <span className="text-2xl font-black text-gray-800 mt-1">{alert.count}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex-1 flex flex-col">
                                <div className="flex justify-between items-start mb-3">
                                    <h3 className="text-sm font-bold text-gray-700">Hong Kong Observatory</h3>
                                    <span className="text-[10px] font-semibold text-gray-400">2026-03-24 09:50 Update</span>
                                </div>
                                <p className="text-[11px] text-gray-500 mb-4 line-clamp-4 leading-relaxed">
                                    Under the influence of the anticyclone aloft, the weather will be fine and hot over the coastal areas of southern China. A cold front is expected to move across the coast of southern China...
                                </p>
                                <div className="mt-auto flex items-center justify-between bg-blue-50/50 p-4 rounded-xl border border-blue-50">
                                    <div className="text-4xl">⛅</div>
                                    <div className="text-right">
                                        <div className="text-3xl font-black text-gray-800">24°C</div>
                                        <div className="text-xs font-bold text-gray-500 mt-1">Humidity: 80%</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 1. Smart Video Analytics (智能視頻分析)
        const SmartVideoAnalytics = () => {
            const statusPieOption = {
                tooltip: { trigger: 'item' },
                color: ['#3b82f6', '#cbd5e1'],
                series: [{
                    type: 'pie', radius: ['60%', '80%'], label: { show: false },
                    data: [ { value: 50, name: 'Online' }, { value: 2, name: 'Offline' } ]
                }]
            };

            const alertTrendOption = {
                grid: { top: 20, right: 10, bottom: 20, left: 30 },
                xAxis: { type: 'category', data: ['08:00', '10:00', '12:00', '14:00', '16:00'], boundaryGap: false },
                yAxis: { type: 'value', splitLine: { lineStyle: { type: 'dashed' } } },
                series: [{
                    data: [2, 5, 1, 8, 3], type: 'line', smooth: true,
                    areaStyle: { color: 'rgba(225,29,72,0.1)' },
                    lineStyle: { color: '#e11d48', width: 2 },
                    itemStyle: { color: '#e11d48' }
                }]
            };

            return (
                <div className="flex flex-col h-full gap-4 animate-in fade-in duration-500">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                        <h2 className="text-xl font-bold text-gray-800">1. Smart Video Analytics</h2>
                        <div className="flex bg-gray-100 p-1 rounded-lg text-xs font-bold">
                            <button className="px-3 py-1.5 bg-white text-blue-600 rounded shadow-sm">Live Feed</button>
                            <button className="px-3 py-1.5 text-gray-500">AI Alerts (12)</button>
                        </div>
                    </div>

                    <div className="flex-1 flex gap-4 overflow-hidden">
                        {/* 左側視頻網格 */}
                        <div className="flex-[3] grid grid-cols-2 grid-rows-2 gap-4">
                            <CCTVPlaceholder title="CV2023 - Gate 1" time="2026-03-24 11:22:15" imgUrl="https://images.unsplash.com/photo-1541888081604-92e104e137b0?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" />
                            <CCTVPlaceholder title="CV2023 - Tower Crane A" time="2026-03-24 11:22:15" imgUrl="https://images.unsplash.com/photo-1503387762-592dea58ef23?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" />
                            <CCTVPlaceholder title="CV2023 - Excavation Zone" time="2026-03-24 11:22:15" imgUrl="https://images.unsplash.com/photo-1581094288338-2314dddb7ece?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" />
                            <CCTVPlaceholder title="CV2023 - Material Hub" time="2026-03-24 11:22:15" status="Offline" />
                        </div>

                        {/* 右側統計面板 */}
                        <div className="flex-1 flex flex-col gap-4">
                            <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex items-center justify-between">
                                <div>
                                    <h3 className="text-xs text-gray-500 font-bold uppercase mb-1">Camera Status</h3>
                                    <div className="text-2xl font-black text-gray-800">50 <span className="text-xs font-normal text-gray-400">/ 52 Online</span></div>
                                </div>
                                <div className="w-16 h-16"><ReactEChart option={statusPieOption} className="w-full h-full" /></div>
                            </div>
                            
                            <div className="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex-1 flex flex-col">
                                <h3 className="text-sm font-bold text-gray-800 mb-2">Today's AI Alerts</h3>
                                <div className="h-32 mb-4 border-b border-gray-100 pb-2"><ReactEChart option={alertTrendOption} className="w-full h-full" /></div>
                                <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                                    {['No Helmet Detected', 'Unauthorized Zone Access', 'Smoking Detected', 'Missing Vest'].map((alert, i) => (
                                        <div key={i} className="p-2 border border-rose-100 bg-rose-50/30 rounded-lg flex justify-between items-center">
                                            <div className="flex items-center gap-2">
                                                <div className="w-2 h-2 rounded-full bg-rose-500"></div>
                                                <span className="text-xs font-semibold text-gray-700">{alert}</span>
                                            </div>
                                            <span className="text-[10px] text-gray-400 font-mono">10:4{i} AM</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 2. Personnel Location (人員定位與考勤)
        const PersonnelLocation = () => {
            const tradePieOption = {
                tooltip: { trigger: 'item' },
                color: ['#3b82f6', '#0ea5e9', '#6366f1', '#8b5cf6'],
                series: [{
                    type: 'pie', radius: ['50%', '70%'],
                    data: [ { value: 45, name: 'Concreter' }, { value: 30, name: 'Steel Fixer' }, { value: 15, name: 'Electrician' }, { value: 10, name: 'Other' } ],
                    label: { show: false }
                }]
            };

            const workers = [
                { id: "W-1042", name: "Chan Tai Man", trade: "Concreter", zone: "Zone A - Level 2", status: "Active" },
                { id: "W-1088", name: "Lee Siu Ming", trade: "Steel Fixer", zone: "Zone B - Foundation", status: "Idle" },
                { id: "W-2091", name: "Wong Ka Ho", trade: "Electrician", zone: "Zone A - Level 1", status: "Active" },
                { id: "W-3044", name: "Ho Chi Kin", trade: "Crane Operator", zone: "Tower Crane 1", status: "Active" },
            ];

            return (
                <div className="flex flex-col h-full gap-4 animate-in fade-in duration-500">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                        <h2 className="text-xl font-bold text-gray-800">2. Personnel Location & Attendance</h2>
